name: Compilar APK

# Compila el APK en cada push a main (o a mano desde la pestaña Actions)
# y lo publica en la release "latest" para descargarlo directo en el móvil.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar paquetes del SDK
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Compilar APK de debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Renombrar APK
        run: cp app/build/outputs/apk/debug/app-debug.apk DualCalWidget.apk

      - name: Subir como artifact
        uses: actions/upload-artifact@v4
        with:
          name: DualCalWidget
          path: DualCalWidget.apk

      - name: Publicar en la release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Última compilación de DualCal Widget
          body: |
            APK más reciente de DualCal Widget.
            Descárgalo en el móvil e instálalo (permite "fuentes desconocidas").
          files: DualCalWidget.apk
